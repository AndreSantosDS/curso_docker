version: '3.8'
services:
  db:
    image: mysql:5.7.22
    volumes:
      - db-data:/var/lib/mysql
    restart: always
    environment:
      TZ: America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: 9139

  wordpress:
    depends_on:
      - db
    image: wordpress:latest
    ports:
      - "8000:80"
    restart: always
    environment:
      TZ: America/Sao_Paulo
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: 9139
      WORDPRESS_DB_NAME: wordpress

volumes:
  db-data: {}